pipeline:
  repo_path: "/path/to/your/repo"
  workspace_base: "~/.agent-pipeline/your-repo-name/workspaces"
  state_base: "~/.agent-pipeline/your-repo-name/state"

agents:
  # Add --resume flags to command if the CLI supports session resume
  # Use the env field to inject per-agent environment variables (e.g. separate GH_TOKEN per agent)
  - name: kiro-cli
    role: coding
    command: "kiro-cli chat --resume --agent senior --no-interactive --trust-all-tools 'You are a coder. Read ISSUE.md first then begin'"
    max_concurrent: 2
    cooldown_minutes: 0
    env:
      GH_TOKEN: "${CODER_GH_TOKEN}"

  - name: claude
    role: review
    command: "claude --dangerously-skip-permissions --continue --model claude-sonnet-4-6 -p 'You are a code reviewer. Read ISSUE.md then begin.'"
    max_concurrent: 1
    cooldown_minutes: 0
    env:
      GH_TOKEN: "${REVIEWER_GH_TOKEN}"

  - name: codex
    role: review
    command: "codex exec --yolo --skip-git-repo-check --model gpt-5.4 resume --last 'You are a code reviewer. Read ISSUE.md then begin.'"
    max_concurrent: 1
    cooldown_minutes: 0
    env:
      GH_TOKEN: "${REVIEWER_GH_TOKEN}"

roles:
  coding:
    pickup_label:
      - "todo"
      - "changes-requested"
    label_on_start: "in-progress"
    label_on_done: "pr-opened"
  review:
    pickup_label: "pr-opened"
    label_on_start: "reviewing"
    label_on_done: "ready-to-merge"

notifications:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  discord:
    webhook_url: "${DISCORD_WEBHOOK_URL}"
